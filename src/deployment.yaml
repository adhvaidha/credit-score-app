apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-app
  template:
    metadata:
      labels:
        app: credit-app
    spec:
      containers:
      - name: credit-app
        image: adhvaidha/credit-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: credit-service
spec:
  type: NodePort
  selector:
    app: credit-app
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30007